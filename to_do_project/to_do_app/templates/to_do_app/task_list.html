{% extends 'to_do_app/base.html' %}

{% block content %}
<h1 class="page-title">My Tasks</h1>

<div class="card">
    <ul class="task-list">
        {% for task in tasks %}
        <li class="task-item">
            <div class="task-info">
                <div class="task-title">{{ task.title }}</div>
                <div class="task-meta">
                    <span class="category-badge category-{{ task.category|lower }}">{{ task.category }}</span>
                    
                    <span class="status-badge status-{{ task.status|lower }}">
                        Status: {{ task.get_status_display }}
                    </span>
                    </div>
            </div>

            <div class="task-actions">
                <a href="{% url 'edit_task' task.id %}" class="btn btn-sm btn-secondary">Edit</a>

                <form method="post" action="{% url 'delete_task' task.id %}" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure?')">
                        Delete
                    </button>
                </form>
            </div>
        </li>
        {% empty %}
        <li class="text-center" style="padding: 2rem;">
            No tasks yet. <a href="{% url 'add_task' %}">Add your first task</a>
        </li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
