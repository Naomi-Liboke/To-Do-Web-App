<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django To-Do App</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'to_do_app/css/style.css' %}">
    <link rel="stylesheet" href="{% static 'to_do_app/css/enhanced.css' %}">
</head>
<body>  
    <header>
        <div class="container">
            <nav class="navbar">
                <div class="logo">To-Do List App</div>
                <ul class="nav-links">
                    <li><a href="{% url 'task_list' %}">Home</a></li>
                    <li><a href="{% url 'add_task' %}">Add Task</a></li>
                    {% if user.is_authenticated %}
                        <li><a href="{% url 'logout' %}">Logout</a></li>
                    {% else %}
                        <li><a href="{% url 'login' %}">Login💻</a></li>
                        <li><a href="{% url 'register' %}">Register</a></li>
                    {% endif %}
                    
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <div id="welcome-message">🌸 Welcome to My To-Do App 🌼</div>

            {% block content %}
            <!-- Page-specific content will go here -->
            {% endblock %}
        </div>
    </main>

</div>

<ul id="taskList"></ul>


    <footer>
        <div class="container">
            <p>&copy; 2025 Django To-Do App. All rights reserved.</p>
        </div>
    </footer>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const welcome = document.getElementById("welcome-message");

        if (welcome) {
            // Fade in
            setTimeout(() => {
                welcome.classList.add("show");
            }, 300);

            // Fade out after 3 seconds
            setTimeout(() => {
                welcome.classList.remove("show");
            }, 3000);

            // Remove from page completely
            setTimeout(() => {
                welcome.style.display = "none";
            }, 4000);
        }
    });
    </script>

</body>
</html>
